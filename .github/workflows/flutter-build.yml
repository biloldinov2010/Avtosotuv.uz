name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.2

      - name: Create Android platform
        run: |
          flutter create --project-name avtosotuv_mobile --org uz.avtosotuv --platforms android .

      - name: Restore our source files
        run: |
          cp -f lib/main.dart lib/main.dart.bak 2>/dev/null || true
          git checkout -- lib/main.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=BASE_URL=${{ secrets.BASE_URL || 'https://avtosotuv.uz' }}

      - name: Build App Bundle
        run: flutter build appbundle --release --dart-define=BASE_URL=${{ secrets.BASE_URL || 'https://avtosotuv.uz' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: avtosotuv-apk
          path: flutter_app/build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: avtosotuv-aab
          path: flutter_app/build/app/outputs/bundle/release/*.aab
